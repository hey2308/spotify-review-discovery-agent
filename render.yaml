databases:
  - name: spotify-discovery-db
    databaseName: spotify_discovery
    user: spotify_discovery
    plan: free

services:
  - type: web
    name: spotify-discovery-api
    runtime: python
    plan: free
    rootDir: backend
    pythonVersion: "3.11.9"
    buildCommand: pip install .
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spotify-discovery-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: "0.1.0"
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
